# Запуск: на сервере рядом с compose лежат .env, каталоги secrets/ и data/ (не в образе).
# docker compose up -d --build

services:
  bot:
    # Не тянуть bot-kicker с Docker Hub (такого образа нет) — только сборка из Dockerfile
    image: bot-kicker:latest
    pull_policy: never
    build:
      context: .
      # Сеть хоста при сборке: DNS/доступ к registry часто стабильнее, чем у внутренней сети buildkit
      network: host
    container_name: bot-kicker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # только чтение для ключа Google; при необходимости смените на rw
      - ./secrets:/app/secrets:ro
      # БД SQLite — персистентность; без тома данные пропадут при удалении контейнера
      - ./data:/app/data
    environment:
      TZ: Europe/Moscow
